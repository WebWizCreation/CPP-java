<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C++ &amp; Java Compendium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <style>
    /* ═══════════════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════════════ */
    :root {
      --bg0: #07070d;
      --bg1: #0c0c16;
      --bg2: #101019;
      --bg3: #161622;
      --bg4: #1d1d2e;
      --bg5: #24243a;
      --bd1: rgba(255, 255, 255, 0.04);
      --bd2: rgba(255, 255, 255, 0.08);
      --bd3: rgba(255, 255, 255, 0.14);
      --t0: #ededf5;
      --t1: #a4a4be;
      --t2: #6a6a88;
      --t3: #3e3e58;
      --cpp: #ff6b2b;
      --cpp-d: rgba(255, 107, 43, 0.10);
      --cpp-g: rgba(255, 107, 43, 0.22);
      --java: #3d9dff;
      --java-d: rgba(61, 157, 255, 0.10);
      --java-g: rgba(61, 157, 255, 0.22);
      --green: #2dd4a0;
      --yellow: #f5c542;
      --red: #ff5757;
      --purple: #a78bfa;
      --fh: 'Syne', sans-serif;
      --fb: 'DM Sans', sans-serif;
      --fm: 'JetBrains Mono', monospace;
      --sw: 292px;
      --hh: 54px;
      --r: 8px;
      --r2: 12px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: var(--fb);
      background: var(--bg0);
      color: var(--t0);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      border: none;
      background: none;
      cursor: pointer;
      font-family: var(--fb);
      color: inherit;
    }

    input {
      font-family: var(--fb);
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bd3);
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--t3);
    }

    /* ═══════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════ */
    #app {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* ═══════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════ */
    .sidebar {
      width: var(--sw);
      flex-shrink: 0;
      height: 100vh;
      background: var(--bg1);
      border-right: 1px solid var(--bd1);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Logo */
    .sb-logo {
      padding: 18px 16px 16px;
      border-bottom: 1px solid var(--bd1);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .sb-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--cpp) 0%, var(--java) 100%);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(255, 107, 43, 0.25);
    }

    .sb-logo-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 60%);
    }

    .sb-logo-title {
      font-family: var(--fh);
      font-size: 14px;
      font-weight: 700;
      color: var(--t0);
      display: block;
      white-space: nowrap;
    }

    .sb-logo-sub {
      font-size: 10.5px;
      color: var(--t3);
      display: block;
      margin-top: 1px;
      white-space: nowrap;
    }

    /* Controls */
    .sb-controls {
      padding: 12px 10px;
      border-bottom: 1px solid var(--bd1);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    /* Track tabs */
    .track-tabs {
      display: flex;
      background: var(--bg0);
      border: 1px solid var(--bd2);
      border-radius: var(--r);
      padding: 3px;
      gap: 2px;
    }

    .tab-btn {
      flex: 1;
      padding: 5px 0;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--t2);
      border-radius: 5px;
      transition: all 0.18s;
      font-family: var(--fh);
      letter-spacing: 0.03em;
    }

    .tab-btn.active {
      background: var(--bg4);
      color: var(--t0);
    }

    .tab-btn.active[data-filter="cpp"] {
      color: var(--cpp);
    }

    .tab-btn.active[data-filter="java"] {
      color: var(--java);
    }

    .tab-btn:hover:not(.active) {
      color: var(--t1);
      background: var(--bg2);
    }

    /* Search */
    .search-wrap {
      position: relative;
    }

    .search-ico {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--t3);
    }

    .search-input {
      width: 100%;
      background: var(--bg0);
      border: 1px solid var(--bd2);
      border-radius: var(--r);
      padding: 8px 10px 8px 32px;
      font-size: 13px;
      color: var(--t1);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .search-input::placeholder {
      color: var(--t3);
    }

    .search-input:focus {
      border-color: var(--bd3);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.03);
      color: var(--t0);
    }

    /* Nav */
    .sb-nav {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 20px;
    }

    .nav-track-header {
      padding: 14px 14px 5px;
      font-size: 10px;
      font-weight: 700;
      font-family: var(--fh);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--t3);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .track-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .nav-track-header.cpp-hdr .track-dot {
      background: var(--cpp);
      box-shadow: 0 0 6px var(--cpp);
    }

    .nav-track-header.java-hdr .track-dot {
      background: var(--java);
      box-shadow: 0 0 6px var(--java);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      margin: 1px 6px;
      border-radius: var(--r);
      cursor: pointer;
      transition: background 0.14s;
      border: 1px solid transparent;
    }

    .nav-item:hover {
      background: var(--bg3);
    }

    .nav-item.active {
      background: var(--bg4);
      border-color: var(--bd2);
    }

    .nav-item.active.cpp-item {
      border-color: rgba(255, 107, 43, 0.22);
      box-shadow: 0 0 16px rgba(255, 107, 43, 0.07);
    }

    .nav-item.active.java-item {
      border-color: rgba(61, 157, 255, 0.22);
      box-shadow: 0 0 16px rgba(61, 157, 255, 0.07);
    }

    .nav-num {
      font-family: var(--fm);
      font-size: 10px;
      color: var(--t3);
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .nav-item.active.cpp-item .nav-num {
      color: var(--cpp);
    }

    .nav-item.active.java-item .nav-num {
      color: var(--java);
    }

    .nav-body {
      flex: 1;
      min-width: 0;
    }

    .nav-title {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--t1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.14s;
    }

    .nav-item:hover .nav-title,
    .nav-item.active .nav-title {
      color: var(--t0);
    }

    .nav-sub {
      font-size: 10.5px;
      color: var(--t3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .nav-arrow {
      font-size: 11px;
      color: var(--t3);
      opacity: 0;
      transition: opacity 0.14s, transform 0.14s;
      flex-shrink: 0;
    }

    .nav-item:hover .nav-arrow,
    .nav-item.active .nav-arrow {
      opacity: 1;
    }

    .nav-item.active .nav-arrow {
      color: var(--t2);
      transform: translateX(1px);
    }

    .nav-hidden {
      display: none !important;
    }

    /* ═══════════════════════════════════════════════════
   MAIN
═══════════════════════════════════════════════════ */
    .main {
      flex: 1;
      min-width: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg2);
    }

    /* Top bar */
    .top-bar {
      height: var(--hh);
      flex-shrink: 0;
      border-bottom: 1px solid var(--bd1);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 14px;
      background: var(--bg2);
      position: relative;
      z-index: 50;
    }

    .hamburger {
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--t1);
      padding: 5px 7px;
      border-radius: 6px;
      transition: background 0.14s;
    }

    .hamburger:hover {
      background: var(--bg4);
    }

    .breadcrumb {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--t2);
      overflow: hidden;
      min-width: 0;
    }

    .breadcrumb span {
      white-space: nowrap;
    }

    .bc-sep {
      color: var(--t3);
    }

    .bc-current {
      color: var(--t1);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bc-cpp {
      color: var(--cpp);
    }

    .bc-java {
      color: var(--java);
    }

    .bc-link {
      cursor: pointer;
      transition: color 0.15s;
    }

    .bc-link:hover {
      color: var(--t0);
      text-decoration: underline;
    }

    .bc-link.bc-cpp:hover {
      color: #ffaa80;
    }

    .bc-link.bc-java:hover {
      color: #90c8ff;
    }

    .home-btn-modern {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: linear-gradient(135deg, rgba(255,107,43,0.1) 0%, rgba(61,157,255,0.1) 100%);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      color: var(--t0);
      font-weight: 600;
      font-family: var(--fh);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
    }
    
    .home-btn-modern:hover {
      background: linear-gradient(135deg, rgba(255,107,43,0.18) 0%, rgba(61,157,255,0.18) 100%);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }

    .reset-btn-modern {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: rgba(255, 87, 87, 0.08);
      border: 1px solid rgba(255, 87, 87, 0.15);
      border-radius: 6px;
      color: #ff6b6b;
      font-weight: 600;
      font-family: var(--fh);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .reset-btn-modern:hover {
      background: rgba(255, 87, 87, 0.15);
      border-color: rgba(255, 87, 87, 0.3);
      transform: translateY(-1px);
      color: #ff8585;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .read-progress-widget {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg3);
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid var(--bd2);
    }
    
    .rp-track {
      width: 60px;
      height: 4px;
      background: var(--bg5);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .rp-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--cpp), var(--java));
      border-radius: 4px;
      transition: width 0.1s;
    }
    
    .rp-text {
      font-size: 11px;
      font-family: var(--fm);
      font-weight: 600;
      color: var(--t1);
      min-width: 28px;
      text-align: right;
    }

    .ch-count-pill {
      font-size: 11px;
      font-family: var(--fm);
      color: var(--t3);
      background: var(--bg3);
      border: 1px solid var(--bd1);
      padding: 3px 10px;
      border-radius: 99px;
    }

    /* Content area */
    .content-area {
      flex: 1;
      overflow-y: auto;
    }

    /* ═══════════════════════════════════════════════════
   WELCOME SCREEN
═══════════════════════════════════════════════════ */
    .welcome {
      padding: 56px 48px 80px;
      max-width: 840px;
      animation: fadeUp 0.35s ease;
    }

    .welcome-eyebrow {
      font-family: var(--fm);
      font-size: 11px;
      color: var(--t3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .welcome-title {
      font-family: var(--fh);
      font-size: 44px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 18px;
      letter-spacing: -0.02em;
    }

    .g-cpp {
      background: linear-gradient(120deg, var(--cpp), #ffaa80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .g-java {
      background: linear-gradient(120deg, var(--java), #90c8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-desc {
      font-size: 15px;
      line-height: 1.75;
      color: var(--t1);
      max-width: 580px;
      margin-bottom: 40px;
    }

    .welcome-tracks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 44px;
    }

    .track-card {
      background: var(--bg3);
      border: 1px solid var(--bd2);
      border-radius: var(--r2);
      padding: 24px;
      transition: border-color 0.22s, transform 0.22s, box-shadow 0.22s;
      cursor: pointer;
    }

    .track-card:hover {
      transform: translateY(-2px);
    }

    .cpp-card:hover {
      border-color: rgba(255, 107, 43, 0.35);
      box-shadow: 0 8px 36px rgba(255, 107, 43, 0.07);
    }

    .java-card:hover {
      border-color: rgba(61, 157, 255, 0.35);
      box-shadow: 0 8px 36px rgba(61, 157, 255, 0.07);
    }

    .tc-icon {
      font-size: 26px;
      margin-bottom: 12px;
    }

    .tc-name {
      font-family: var(--fh);
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 7px;
    }

    .cpp-card .tc-name {
      color: var(--cpp);
    }

    .java-card .tc-name {
      color: var(--java);
    }

    .tc-desc {
      font-size: 13px;
      color: var(--t1);
      line-height: 1.65;
      margin-bottom: 12px;
    }

    .tc-count {
      font-family: var(--fm);
      font-size: 10.5px;
      color: var(--t3);
    }

    .welcome-stats {
      display: flex;
      gap: 36px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .stat-n {
      font-family: var(--fh);
      font-size: 30px;
      font-weight: 800;
      color: var(--t0);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-l {
      font-size: 12px;
      color: var(--t2);
    }

    .server-hint {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      color: var(--t2);
      padding: 13px 16px;
      background: var(--bg3);
      border: 1px solid var(--bd2);
      border-radius: var(--r);
    }

    .server-hint code {
      font-family: var(--fm);
      font-size: 12px;
      color: var(--t1);
      background: var(--bg5);
      padding: 1px 6px;
      border-radius: 4px;
    }

    /* ═══════════════════════════════════════════════════
   CHAPTER WRAPPER
═══════════════════════════════════════════════════ */
    .ch-wrap {
      max-width: 840px;
      padding: 48px 48px 88px;
      animation: fadeUp 0.3s ease;
    }

    /* Chapter header */
    .ch-hdr {
      margin-bottom: 44px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--bd1);
    }

    .ch-meta {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .ch-badge {
      font-family: var(--fm);
      font-size: 10.5px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .b-cpp {
      background: var(--cpp-d);
      color: var(--cpp);
      border: 1px solid rgba(255, 107, 43, 0.25);
    }

    .b-java {
      background: var(--java-d);
      color: var(--java);
      border: 1px solid rgba(61, 157, 255, 0.25);
    }

    .b-num {
      background: var(--bg3);
      color: var(--t3);
      border: 1px solid var(--bd1);
    }

    .b-time {
      font-size: 11.5px;
      color: var(--t3);
      margin-left: auto;
    }

    .ch-title {
      font-family: var(--fh);
      font-size: 34px;
      font-weight: 800;
      line-height: 1.15;
      color: var(--t0);
      margin-bottom: 11px;
      letter-spacing: -0.015em;
    }

    .ch-desc {
      font-size: 15px;
      color: var(--t1);
      line-height: 1.75;
    }

    /* ═══════════════════════════════════════════════════
   CONTENT SECTION TYPES
═══════════════════════════════════════════════════ */
    .sec {
      margin-bottom: 28px;
    }

    /* Headings */
    .sec-h2 {
      font-family: var(--fh);
      font-size: 21px;
      font-weight: 700;
      color: var(--t0);
      margin-bottom: 12px;
      padding-top: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sec-h2::before {
      content: '';
      display: block;
      width: 3px;
      height: 20px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .cpp-content .sec-h2::before {
      background: var(--cpp);
      box-shadow: 0 0 8px var(--cpp-g);
    }

    .java-content .sec-h2::before {
      background: var(--java);
      box-shadow: 0 0 8px var(--java-g);
    }

    .sec-h3 {
      font-family: var(--fh);
      font-size: 16px;
      font-weight: 600;
      color: var(--t0);
      margin-bottom: 9px;
    }

    .sec-h4 {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--t1);
      margin-bottom: 7px;
    }

    /* Paragraph */
    .sec-p {
      font-size: 14.5px;
      line-height: 1.82;
      color: var(--t1);
    }

    .sec-p+.sec-p {
      margin-top: 10px;
    }

    .sec-p strong {
      color: var(--t0);
      font-weight: 600;
    }

    .sec-p em {
      font-style: italic;
    }

    /* Inline code (used in paragraphs, lists, tables) */
    .ic {
      font-family: var(--fm);
      font-size: 12.5px;
      background: var(--bg4);
      border: 1px solid var(--bd2);
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--t0);
    }

    /* Code block */
    .code-block {
      background: var(--bg0);
      border: 1px solid var(--bd2);
      border-radius: var(--r2);
      overflow: hidden;
      margin: 4px 0;
    }

    .code-block-hdr {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 14px;
      background: var(--bg1);
      border-bottom: 1px solid var(--bd1);
    }

    .clang {
      font-family: var(--fm);
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .clang-cpp {
      background: var(--cpp-d);
      color: var(--cpp);
    }

    .clang-java {
      background: var(--java-d);
      color: var(--java);
    }

    .clang-default {
      background: var(--bg3);
      color: var(--t2);
    }

    .code-title-txt {
      flex: 1;
      font-size: 12px;
      color: var(--t2);
      font-family: var(--fm);
    }

    .copy-btn {
      font-size: 11px;
      color: var(--t3);
      padding: 3px 10px;
      border-radius: 5px;
      border: 1px solid var(--bd2);
      background: var(--bg3);
      transition: all 0.15s;
    }

    .copy-btn:hover {
      color: var(--t1);
      border-color: var(--bd3);
    }

    .copy-btn.copied {
      color: var(--green);
      border-color: rgba(45, 212, 160, 0.3);
    }

    .code-block pre {
      margin: 0;
      padding: 18px 20px;
      overflow-x: auto;
      background: var(--bg0) !important;
    }

    .code-block pre code {
      font-family: var(--fm) !important;
      font-size: 13px !important;
      line-height: 1.72 !important;
      background: transparent !important;
      padding: 0 !important;
    }

    .hljs {
      background: transparent !important;
    }

    /* List */
    .sec-ul,
    .sec-ol {
      font-size: 14.5px;
      line-height: 1.8;
      color: var(--t1);
    }

    .sec-ul {
      list-style: none;
      padding: 0;
    }

    .sec-ul li {
      padding: 2px 0 2px 18px;
      position: relative;
    }

    .sec-ul li::before {
      content: '▸';
      position: absolute;
      left: 0;
      font-size: 10px;
      top: 7px;
      color: var(--t3);
    }

    .cpp-content .sec-ul li::before {
      color: var(--cpp);
    }

    .java-content .sec-ul li::before {
      color: var(--java);
    }

    .sec-ol {
      padding-left: 22px;
    }

    .sec-ol li {
      padding: 2px 0;
    }

    /* Callout */
    .callout {
      display: flex;
      gap: 13px;
      padding: 15px 18px;
      border-radius: var(--r2);
      border: 1px solid;
      margin: 4px 0;
    }

    .callout-note {
      background: rgba(167, 139, 250, 0.07);
      border-color: rgba(167, 139, 250, 0.22);
    }

    .callout-tip {
      background: rgba(45, 212, 160, 0.07);
      border-color: rgba(45, 212, 160, 0.22);
    }

    .callout-warning {
      background: rgba(245, 197, 66, 0.07);
      border-color: rgba(245, 197, 66, 0.22);
    }

    .callout-danger {
      background: rgba(255, 87, 87, 0.07);
      border-color: rgba(255, 87, 87, 0.22);
    }

    .callout-ico {
      font-size: 17px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .callout-lbl {
      font-size: 12.5px;
      font-weight: 600;
      font-family: var(--fh);
      margin-bottom: 4px;
    }

    .callout-note .callout-lbl {
      color: var(--purple);
    }

    .callout-tip .callout-lbl {
      color: var(--green);
    }

    .callout-warning .callout-lbl {
      color: var(--yellow);
    }

    .callout-danger .callout-lbl {
      color: var(--red);
    }

    .callout-txt {
      font-size: 13.5px;
      color: var(--t1);
      line-height: 1.72;
    }

    /* Accordion */
    .accordion {
      border: 1px solid var(--bd2);
      border-radius: var(--r2);
      overflow: hidden;
      margin: 4px 0;
    }

    .acc-head {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 13px 16px;
      background: var(--bg3);
      cursor: pointer;
      user-select: none;
      transition: background 0.14s;
    }

    .acc-head:hover {
      background: var(--bg4);
    }

    .acc-badge {
      font-family: var(--fm);
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .acc-predict {
      background: rgba(167, 139, 250, 0.12);
      color: var(--purple);
      border: 1px solid rgba(167, 139, 250, 0.28);
    }

    .acc-error {
      background: rgba(255, 87, 87, 0.12);
      color: var(--red);
      border: 1px solid rgba(255, 87, 87, 0.28);
    }

    .acc-solve {
      background: rgba(45, 212, 160, 0.12);
      color: var(--green);
      border: 1px solid rgba(45, 212, 160, 0.28);
    }

    .acc-q {
      flex: 1;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--t0);
    }

    .acc-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      color: var(--t2);
      background: var(--bg5);
      border: 1px solid var(--bd2);
      padding: 4px 11px;
      border-radius: 6px;
      transition: all 0.14s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .acc-toggle:hover {
      color: var(--t0);
    }

    .acc-arr {
      transition: transform 0.22s;
      display: inline-block;
      font-size: 9px;
    }

    .accordion.open .acc-arr {
      transform: rotate(180deg);
    }

    .acc-code {
      border-top: 1px solid var(--bd1);
    }

    .acc-code .code-block {
      margin: 0;
      border: none;
      border-radius: 0;
    }

    .acc-code .code-block-hdr {
      border-radius: 0;
    }

    .acc-ans {
      display: none;
      border-top: 1px solid var(--bd2);
      padding: 18px 20px;
      background: var(--bg2);
      animation: fadeDown 0.2s ease;
    }

    .accordion.open .acc-ans {
      display: block;
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .ans-lbl {
      font-family: var(--fm);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .lbl-output {
      color: var(--purple);
    }

    .lbl-error {
      color: var(--red);
    }

    .lbl-explain {
      color: var(--t3);
      margin-top: 14px;
    }

    .lbl-fix {
      color: var(--green);
      margin-top: 14px;
    }

    .ans-out {
      font-family: var(--fm);
      font-size: 13.5px;
      background: var(--bg0);
      border: 1px solid var(--bd2);
      border-radius: var(--r);
      padding: 11px 14px;
      color: var(--t0);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .ans-txt {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--t1);
    }

    /* Divider */
    .sec-div {
      border: none;
      border-top: 1px solid var(--bd1);
      margin: 36px 0;
    }

    /* Table */
    .tbl-wrap {
      overflow-x: auto;
      margin: 4px 0;
    }

    .sec-tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    .sec-tbl th {
      text-align: left;
      padding: 9px 14px;
      font-family: var(--fh);
      font-size: 11px;
      font-weight: 600;
      color: var(--t2);
      letter-spacing: 0.06em;
      background: var(--bg3);
      border: 1px solid var(--bd1);
      text-transform: uppercase;
    }

    .sec-tbl td {
      padding: 9px 14px;
      color: var(--t1);
      border: 1px solid var(--bd1);
      vertical-align: top;
      line-height: 1.6;
    }

    .sec-tbl tr:hover td {
      background: var(--bg3);
    }

    /* Chapter footer nav */
    .ch-footer-nav {
      display: flex;
      gap: 10px;
      margin-top: 60px;
      padding-top: 28px;
      border-top: 1px solid var(--bd1);
    }

    .ch-nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 18px;
      border-radius: var(--r);
      border: 1px solid var(--bd2);
      background: var(--bg3);
      font-size: 13px;
      color: var(--t1);
      transition: all 0.18s;
      cursor: pointer;
      text-align: left;
    }

    .ch-nav-btn:hover {
      background: var(--bg4);
      color: var(--t0);
      border-color: var(--bd3);
    }

    .ch-nav-btn.next-btn {
      margin-left: auto;
      text-align: right;
    }

    .cnb-lbl {
      font-size: 10.5px;
      color: var(--t3);
      display: block;
      margin-bottom: 2px;
      font-family: var(--fm);
    }

    .cnb-title {
      font-weight: 500;
      font-size: 13px;
    }

    /* Loading */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 65vh;
      gap: 16px;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 2px solid var(--bd2);
      border-top-color: var(--cpp);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-txt {
      font-size: 12.5px;
      color: var(--t2);
      font-family: var(--fm);
    }

    /* Error */
    .err-wrap {
      padding: 56px 48px;
      max-width: 600px;
    }

    .err-code {
      font-family: var(--fm);
      font-size: 52px;
      font-weight: 800;
      color: var(--bd3);
      margin-bottom: 10px;
    }

    .err-title {
      font-family: var(--fh);
      font-size: 22px;
      font-weight: 700;
      color: var(--t0);
      margin-bottom: 8px;
    }

    .err-desc {
      font-size: 14px;
      color: var(--t1);
      line-height: 1.75;
    }

    .err-hint {
      margin-top: 24px;
      padding: 13px 16px;
      background: var(--bg3);
      border: 1px solid var(--bd2);
      border-radius: var(--r);
      font-size: 13px;
      color: var(--t2);
      line-height: 1.7;
    }

    .err-hint code {
      font-family: var(--fm);
      font-size: 12px;
      color: var(--t0);
      background: var(--bg5);
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* Mobile overlay */
    .sb-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 90;
      backdrop-filter: blur(3px);
    }

    .sb-overlay.vis {
      display: block;
    }

    /* Right Sidebar */
    .right-sidebar {
      width: 260px;
      flex-shrink: 0;
      overflow-y: auto;
      border-left: 1px solid var(--bd1);
      background: var(--bg1);
      padding: 24px 20px;
      display: none;
    }

    .rs-title {
      font-size: 11px;
      font-weight: 700;
      font-family: var(--fh);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 16px;
    }

    .rs-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rs-item {
      font-size: 13px;
      color: var(--t2);
      text-decoration: none;
      line-height: 1.4;
      padding: 6px 12px;
      border-radius: var(--r);
      position: relative;
      overflow: hidden;
      transition: color 0.25s, background 0.25s;
    }

    .rs-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: transparent;
      transition: background 0.25s;
    }

    .rs-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: transparent;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .rs-l2 {
      font-weight: 500;
    }

    .rs-l3 {
      padding-left: 20px;
      font-size: 12.5px;
    }

    .rs-l4 {
      padding-left: 28px;
      font-size: 12px;
      opacity: 0.8;
    }

    .rs-item:hover {
      color: var(--t0);
      background: var(--bg3);
    }

    .rs-item.active {
      color: var(--t0);
      background: var(--bg4);
    }

    .right-sidebar.cpp-content .rs-item.active::before {
      background: var(--cpp);
    }

    .right-sidebar.cpp-content .rs-item.active::after {
      background: linear-gradient(90deg, rgba(255, 107, 43, 0.1) 0%, transparent 100%);
      opacity: 1;
    }

    .right-sidebar.java-content .rs-item.active::before {
      background: var(--java);
    }

    .right-sidebar.java-content .rs-item.active::after {
      background: linear-gradient(90deg, rgba(61, 157, 255, 0.1) 0%, transparent 100%);
      opacity: 1;
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ═══════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════ */
    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-100%);
        box-shadow: 4px 0 40px rgba(0, 0, 0, 0.6);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .hamburger {
        display: flex;
      }

      .welcome {
        padding: 36px 22px 60px;
      }

      .welcome-tracks {
        grid-template-columns: 1fr;
      }

      .ch-wrap {
        padding: 30px 22px 60px;
      }

      .ch-title {
        font-size: 26px;
      }

      .welcome-title {
        font-size: 34px;
      }
    }

    @media (max-width: 580px) {
      .ch-footer-nav {
        flex-direction: column;
      }

      .ch-nav-btn.next-btn {
        margin-left: 0;
      }

      .welcome-stats {
        gap: 22px;
      }

      .progress-divider {
        display: none;
      }
    }

    .toc-btn-mobile {
      display: none;
      background: none;
      border: none;
      color: var(--t1);
      cursor: pointer;
      padding: 5px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .toc-btn-mobile:hover {
      background: var(--bg4);
      color: var(--t0);
    }

    @media (max-width: 1100px) {
      .right-sidebar {
        position: fixed;
        top: 0;
        right: -300px;
        width: 280px;
        height: 100vh;
        z-index: 1000;
        background: var(--bg2);
        border-left: 1px solid var(--bd1);
        border-bottom: none;
        max-height: none;
        transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: -5px 0 20px rgba(0,0,0,0.5);
      }
      .right-sidebar.open {
        right: 0;
      }
      .toc-btn-mobile.active-chapter {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }

    @media (max-width: 768px) {
      .btn-text {
        display: none;
      }
      .rp-track {
        width: 30px;
      }
      .ch-count-pill {
        display: none;
      }
      .bc-sep {
        margin: 0 2px;
      }
      .home-btn-modern, .reset-btn-modern {
        padding: 5px 8px;
      }
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- ════════════ SIDEBAR ════════════ -->
    <aside class="sidebar" id="sidebar">


      <div class="sb-controls">
        <div class="track-tabs" id="trackTabs">
          <button class="tab-btn active" data-filter="all">All</button>
          <button class="tab-btn" data-filter="cpp">C++</button>
          <button class="tab-btn" data-filter="java">Java</button>
        </div>
        <div class="search-wrap">
          <svg class="search-ico" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input class="search-input" id="searchInput" type="text" placeholder="Search chapters… (Ctrl+K)"
            autocomplete="off" spellcheck="false">
        </div>
      </div>

      <nav class="sb-nav" id="sbNav"></nav>

    </aside>

    <!-- ════════════ MAIN ════════════ -->
    <div class="main">
      <header class="top-bar">
        <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div class="breadcrumb" id="breadcrumb">
          <span class="bc-link" onclick="goHome()">Home</span>
        </div>
        <div class="top-bar-right">
          <button class="toc-btn-mobile" id="tocBtnMobile" onclick="openRightSidebar()" aria-label="Table of Contents">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6"></line>
              <line x1="8" y1="12" x2="21" y2="12"></line>
              <line x1="8" y1="18" x2="21" y2="18"></line>
              <line x1="3" y1="6" x2="3.01" y2="6"></line>
              <line x1="3" y1="12" x2="3.01" y2="12"></line>
              <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
          </button>
          <div id="readProgressWidget" class="read-progress-widget" style="display: none;">
            <div class="rp-track"><div class="rp-bar" id="readMeterBar"></div></div>
            <span class="rp-text" id="readMeterText">0%</span>
          </div>
          <span class="ch-count-pill">40 Chapters</span>
        </div>
      </header>
      <div class="main-body" style="display: flex; flex: 1; min-height: 0; overflow: hidden;">
        <main class="content-area" id="contentArea"></main>
        <aside class="right-sidebar" id="rightSidebar"></aside>
      </div>
    </div>

  </div>
  <div class="sb-overlay" id="overlay"></div>

  <!-- Highlight.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>

  <script>
    /* ═══════════════════════════════════════════════════
       ① COMPLETE TABLE OF CONTENTS (40 Chapters)
    ═══════════════════════════════════════════════════ */
    const TOC = [
      /* ── C++ Track ─────────────────────────────── */
      { id: 'CPP_Ch1_Foundations', track: 'cpp', num: 1, title: 'Foundations & I/O', sub: 'Variables, data types, cin/cout' },
      { id: 'CPP_Ch2_Control_Flow', track: 'cpp', num: 2, title: 'Control Flow', sub: 'if/else, switch, for, while loops' },
      { id: 'CPP_Ch3_Functions_Recursion', track: 'cpp', num: 3, title: 'Functions & Recursion', sub: 'Scope, pass-by-ref, recursion patterns' },
      { id: 'CPP_Ch4_Arrays_Strings', track: 'cpp', num: 4, title: 'Arrays & Strings', sub: '1D/2D arrays, string class, C-strings' },
      { id: 'CPP_Ch5_STL_Vectors_Pairs', track: 'cpp', num: 5, title: 'STL: Vectors & Pairs', sub: 'push_back, emplace, pair, tuple' },
      { id: 'CPP_Ch6_STL_Maps_Sets', track: 'cpp', num: 6, title: 'STL: Maps & Sets', sub: 'map, set, unordered variants, multimap' },
      { id: 'CPP_Ch7_STL_Algorithms', track: 'cpp', num: 7, title: 'STL: Algorithms', sub: 'sort, lower_bound, accumulate, next_permut' },
      { id: 'CPP_Ch8_Sorting_Techniques', track: 'cpp', num: 8, title: 'Sorting Techniques', sub: 'Merge sort, counting sort, comparators' },
      { id: 'CPP_Ch9_Binary_Search', track: 'cpp', num: 9, title: 'Binary Search', sub: 'Template, answer search, monotonic functions' },
      { id: 'CPP_Ch10_Complexity_Analysis', track: 'cpp', num: 10, title: 'Complexity Analysis', sub: 'Big-O, time/space, loop analysis' },
      { id: 'CPP_Ch11_Two_Pointers', track: 'cpp', num: 11, title: 'Two Pointers & Sliding Window', sub: 'Classic patterns, subarrays, strings' },
      { id: 'CPP_Ch12_Stack_Queue_Deque', track: 'cpp', num: 12, title: 'Stack, Queue & Deque', sub: 'Monotone stack, BFS queues, deque tricks' },
      { id: 'CPP_Ch13_Recursion_Backtrack', track: 'cpp', num: 13, title: 'Recursion & Backtracking', sub: 'Permutations, subsets, N-Queens' },
      { id: 'CPP_Ch14_Greedy_Algorithms', track: 'cpp', num: 14, title: 'Greedy Algorithms', sub: 'Interval scheduling, exchange argument' },
      { id: 'CPP_Ch15_DP_Introduction', track: 'cpp', num: 15, title: 'Dynamic Programming: Intro', sub: 'Memoization, tabulation, DP mindset' },
      { id: 'CPP_Ch16_DP_Classical', track: 'cpp', num: 16, title: 'DP: Classical Problems', sub: 'LCS, LIS, Knapsack, Coin Change' },
      { id: 'CPP_Ch17_Graph_BFS_DFS', track: 'cpp', num: 17, title: 'Graphs: BFS & DFS', sub: 'Adjacency list, traversal, connectivity' },
      { id: 'CPP_Ch18_Graph_Advanced', track: 'cpp', num: 18, title: 'Graphs: Advanced', sub: 'Dijkstra, Bellman-Ford, Topological Sort' },
      { id: 'CPP_Ch19_Trees_BST', track: 'cpp', num: 19, title: 'Trees & Binary Search Trees', sub: 'DFS on trees, BST operations, LCA' },
      { id: 'CPP_Ch20_Number_Theory', track: 'cpp', num: 20, title: 'Number Theory & Math', sub: 'GCD, primes, sieve, modular arithmetic' },

      /* ── Java Track ─────────────────────────────── */
      { id: 'Java_Ch1_OutputPrediction', track: 'java', num: 1, title: 'Output Prediction', sub: 'print/println/printf, expressions' },
      { id: 'Java_Ch2_ErrorIdentification', track: 'java', num: 2, title: 'Error Identification', sub: 'Compile-time, runtime & logical errors' },
      { id: 'Java_Ch3_DataTypes_TypeCast', track: 'java', num: 3, title: 'Data Types & Type Casting', sub: 'Primitives, wrappers, implicit/explicit cast' },
      { id: 'Java_Ch4_Operators_Expr', track: 'java', num: 4, title: 'Operators & Expressions', sub: 'Arithmetic, bitwise, ternary, precedence' },
      { id: 'Java_Ch5_Control_Flow', track: 'java', num: 5, title: 'Control Flow', sub: 'if/else, switch, for, while, do-while' },
      { id: 'Java_Ch6_Loops_Nested', track: 'java', num: 6, title: 'Loops & Nested Loops', sub: 'Pattern printing, loop tracing, output pred' },
      { id: 'Java_Ch7_Arrays_2D', track: 'java', num: 7, title: 'Arrays & 2D Arrays', sub: 'Initialization, iteration, array tricks' },
      { id: 'Java_Ch8_Methods_Overloading', track: 'java', num: 8, title: 'Methods & Overloading', sub: 'Pass by value, varargs, method overloading' },
      { id: 'Java_Ch9_OOP_Classes', track: 'java', num: 9, title: 'OOP: Classes & Objects', sub: 'Fields, methods, object creation, heap' },
      { id: 'Java_Ch10_Constructors_Static', track: 'java', num: 10, title: 'Constructors, this & static', sub: 'Constructor chaining, static members' },
      { id: 'Java_Ch11_Inheritance', track: 'java', num: 11, title: 'Inheritance & super', sub: 'extends, super(), method hiding, is-a' },
      { id: 'Java_Ch12_Polymorphism', track: 'java', num: 12, title: 'Polymorphism & Overriding', sub: 'Dynamic dispatch, @Override, casting' },
      { id: 'Java_Ch13_Abstract_Interface', track: 'java', num: 13, title: 'Abstract Classes & Interfaces', sub: 'abstract, interface, default methods' },
      { id: 'Java_Ch14_Encapsulation', track: 'java', num: 14, title: 'Encapsulation & Access', sub: 'private/protected/public, getters, setters' },
      { id: 'Java_Ch15_Exception_Handling', track: 'java', num: 15, title: 'Exception Handling', sub: 'try/catch/finally, throws, custom exceptions' },
      { id: 'Java_Ch16_Strings_Builder', track: 'java', num: 16, title: 'Strings & StringBuilder', sub: 'Immutability, String methods, StringBuilder' },
      { id: 'Java_Ch17_Collections', track: 'java', num: 17, title: 'Collections Framework', sub: 'ArrayList, LinkedList, HashMap, HashSet' },
      { id: 'Java_Ch18_Generics_Wrappers', track: 'java', num: 18, title: 'Generics & Wrapper Classes', sub: 'Type parameters, autoboxing, unboxing' },
      { id: 'Java_Ch19_Complex_Output', track: 'java', num: 19, title: 'Complex Output Prediction', sub: 'Inheritance chains, polymorphism tracing' },
      { id: 'Java_Ch20_Mixed_OOP_Problems', track: 'java', num: 20, title: 'Mixed OOP Problems', sub: 'Full-program analysis, exam-style questions' },
    ];

    /* ═══════════════════════════════════════════════════
       ② STATE
    ═══════════════════════════════════════════════════ */
    const state = { activeId: null, filter: 'all', query: '' };
    const tracking = {
      readChapters: JSON.parse(localStorage.getItem('readChapters') || '[]'),
      lastChapter: localStorage.getItem('lastChapter') || null
    };

    /* ═══════════════════════════════════════════════════
       ③ SIDEBAR BUILDER
    ═══════════════════════════════════════════════════ */
    function buildSidebar() {
      const nav = document.getElementById('sbNav');
      const q = state.query.toLowerCase().trim();
      const tracks = state.filter === 'cpp' ? ['cpp'] : state.filter === 'java' ? ['java'] : ['cpp', 'java'];
      let html = '';

      tracks.forEach(track => {
        const label = track === 'cpp' ? 'C++ Track' : 'Java Track';
        html += `<div class="nav-track-header ${track}-hdr"><span class="track-dot"></span>${label}</div>`;
        TOC.filter(c => c.track === track).forEach(ch => {
          const hidden = (q && !ch.title.toLowerCase().includes(q) && !ch.sub.toLowerCase().includes(q)) ? ' nav-hidden' : '';
          const active = state.activeId === ch.id ? ' active' : '';
          const isRead = tracking.readChapters.includes(ch.id);

          html += `
      <div class="nav-item ${track}-item${active}${hidden}" data-id="${ch.id}" role="button" tabindex="0" aria-label="${ch.title}">
        <span class="nav-num">${String(ch.num).padStart(2, '0')}</span>
        <div class="nav-body">
          <div class="nav-title">${ch.title}</div>
          <div class="nav-sub">${ch.sub}</div>
        </div>
        ${isRead ? `<span style="color: var(--green); font-size: 10px; margin-right: 5px;" title="Read">✓</span>` : ''}
        <span class="nav-arrow">›</span>
      </div>`;
        });
      });

      nav.innerHTML = html;
      nav.querySelectorAll('.nav-item').forEach(el => {
        el.addEventListener('click', () => { loadChapter(el.dataset.id); if (window.innerWidth < 900) closeSidebar(); });
        el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); } });
      });
    }

    /* ═══════════════════════════════════════════════════
       ④ CHAPTER LOADER
    ═══════════════════════════════════════════════════ */
    async function loadChapter(id) {
      state.activeId = id;

      tracking.lastChapter = id;
      localStorage.setItem('lastChapter', id);

      buildSidebar();
      setBreadcrumb(id);
      showLoading();
      document.getElementById('contentArea').scrollTop = 0;
      
      const pw = document.getElementById('readProgressWidget');
      if (pw) {
        pw.style.display = 'flex';
        const mb = document.getElementById('readMeterBar');
        const mt = document.getElementById('readMeterText');
        if (mb) mb.style.width = '0%';
        if (mt) mt.textContent = '0%';
      }
      
      try {
        const res = await fetch(`content/${id}.json`);
        if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
        renderContent(await res.json());
      } catch (err) {
        showError(id, err);
      }
    }

    function setBreadcrumb(id) {
      const ch = TOC.find(c => c.id === id);
      if (!ch) return;
      const tcls = ch.track === 'cpp' ? 'bc-cpp' : 'bc-java';
      const tlbl = ch.track === 'cpp' ? 'C++ Track' : 'Java Track';
      document.getElementById('breadcrumb').innerHTML =
        `<span class="home-btn-modern" onclick="goHome()">
           <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
           <span class="btn-text">Home</span>
         </span>
         <button class="reset-btn-modern" onclick="resetProgress()" title="Reset Progress">
           <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
           <span class="btn-text">Reset</span>
         </button>
         <span class="bc-sep">›</span><span class="bc-link ${tcls}" onclick="filterTrack('${ch.track}')">${tlbl}</span><span class="bc-sep">›</span><span class="bc-current">Ch${ch.num}: ${esc(ch.title)}</span>`;
    }

    /* ═══════════════════════════════════════════════════
       ⑤ CONTENT RENDERER
    ═══════════════════════════════════════════════════ */
    function renderContent(data) {
      const tc = data.track === 'cpp' ? 'cpp-content' : 'java-content';
      const badge = data.track === 'cpp'
        ? '<span class="ch-badge b-cpp">C++</span>'
        : '<span class="ch-badge b-java">Java</span>';
      const readTime = Math.max(3, Math.round(JSON.stringify(data).split(/\s+/).length / 180));
      const sections = (data.sections || []).map(renderSection).join('');
      const footer = buildFooterNav(state.activeId);

      document.getElementById('contentArea').innerHTML = `
    <div class="ch-wrap ${tc}">
      <div class="ch-hdr">
        <div class="ch-meta">
          ${badge}
          <span class="ch-badge b-num">Chapter ${data.chapter}</span>
          <span class="b-time">~${readTime} min read</span>
        </div>
        <h1 class="ch-title">${esc(data.title)}</h1>
        ${data.description ? `<p class="ch-desc">${esc(data.description)}</p>` : ''}
      </div>
      <div class="ch-body">${sections}</div>
      ${footer}
    </div>`;

      document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      initAccordions();

      const tocBtn = document.getElementById('tocBtnMobile');
      const rightSidebar = document.getElementById('rightSidebar');
      if (rightSidebar) {
        rightSidebar.className = 'right-sidebar ' + tc;
        const headings = (data.sections || []).filter(s => s.type === 'heading');
        if (headings.length > 0) {
          let tocHtml = '<div class="rs-title">On this page</div><div class="rs-list">';
          headings.forEach(h => {
            const l = Math.min(Math.max(h.level || 2, 2), 4);
            const id = 'h-' + h.content.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
            tocHtml += `<a href="#${id}" class="rs-item rs-l${l}" data-target="${id}" onclick="if(window.innerWidth <= 1100) closeSidebar()">${esc(h.content)}</a>`;
          });
          tocHtml += '</div>';
          rightSidebar.innerHTML = tocHtml;
          rightSidebar.style.display = 'block';
          if (tocBtn) tocBtn.classList.add('active-chapter');
        } else {
          rightSidebar.innerHTML = '';
          rightSidebar.style.display = 'none';
          if (tocBtn) tocBtn.classList.remove('active-chapter');
        }
      }

      setTimeout(() => {
        const ca = document.getElementById('contentArea');
        if (ca) ca.dispatchEvent(new Event('scroll'));
      }, 50);
    }

    /* Section router */
    function renderSection(s) {
      switch (s.type) {
        case 'heading': return `<div class="sec">${renderHeading(s)}</div>`;
        case 'paragraph': return `<div class="sec"><p class="sec-p">${inline(s.content)}</p></div>`;
        case 'code': return `<div class="sec">${renderCode(s)}</div>`;
        case 'accordion': return `<div class="sec">${renderAccordion(s)}</div>`;
        case 'callout': return `<div class="sec">${renderCallout(s)}</div>`;
        case 'list': return `<div class="sec">${renderList(s)}</div>`;
        case 'table': return `<div class="sec">${renderTable(s)}</div>`;
        case 'divider': return '<hr class="sec-div">';
        default: return '';
      }
    }

    function renderHeading(s) {
      const l = Math.min(Math.max(s.level || 2, 2), 4);
      const id = 'h-' + s.content.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
      return `<h${l} id="${id}" class="sec-h${l}">${inline(s.content)}</h${l}>`;
    }

    function renderCode(s, nested = false) {
      const lang = s.language || 'plaintext';
      const lcls = lang === 'cpp' ? 'clang-cpp' : lang === 'java' ? 'clang-java' : 'clang-default';
      const cid = 'cb' + Math.random().toString(36).slice(2, 9);
      const radii = nested ? 'border-radius:0;' : '';
      return `
    <div class="code-block" style="${radii}">
      <div class="code-block-hdr">
        <span class="clang ${lcls}">${esc(lang)}</span>
        <span class="code-title-txt">${esc(s.title || '')}</span>
        <button class="copy-btn" onclick="copyCode(this,'${cid}')">Copy</button>
      </div>
      <pre><code id="${cid}" class="language-${lang}">${esc(s.code || s.content || '')}</code></pre>
    </div>`;
    }

    function renderAccordion(s) {
      const v = s.variant || 'predict-output';
      const badgeCls = v === 'find-error' ? 'acc-error' : v === 'problem-solving' ? 'acc-solve' : 'acc-predict';
      const badgeLbl = v === 'find-error' ? '🐛 Find the Error' : v === 'problem-solving' ? '💡 Solve It' : '🔍 Predict Output';

      const codeHTML = s.code
        ? `<div class="acc-code">${renderCode({ language: s.language || 'java', code: s.code, title: s.codeTitle || '' }, true)}</div>`
        : '';

      let ansHTML = '';
      if (v === 'find-error') {
        ansHTML = `
      <div class="ans-lbl lbl-error">✗ Error Identified</div>
      <div class="ans-out">${esc(s.error || '')}</div>
      ${s.fix ? `<div class="ans-lbl lbl-fix">✓ Corrected Code</div>${renderCode({ language: s.language || 'java', code: s.fix, title: 'Fixed' }, true)}` : ''}
      ${s.explanation ? `<div class="ans-lbl lbl-explain">💬 Explanation</div><p class="ans-txt">${inline(s.explanation)}</p>` : ''}`;
      } else if (v === 'problem-solving') {
        ansHTML = `
      ${s.approach ? `<div class="ans-lbl lbl-fix">📐 Approach</div><p class="ans-txt" style="margin-bottom:10px">${inline(s.approach)}</p>` : ''}
      ${s.solution ? renderCode({ language: s.language || 'cpp', code: s.solution, title: 'Solution' }, true) : ''}
      ${s.explanation ? `<div class="ans-lbl lbl-explain">💬 Explanation</div><p class="ans-txt">${inline(s.explanation)}</p>` : ''}`;
      } else {
        ansHTML = `
      <div class="ans-lbl lbl-output">▶ Output</div>
      <div class="ans-out">${esc(s.answer || '')}</div>
      ${s.explanation ? `<div class="ans-lbl lbl-explain">💬 Explanation</div><p class="ans-txt">${inline(s.explanation)}</p>` : ''}`;
      }

      return `
    <div class="accordion" data-acc>
      <div class="acc-head">
        <span class="acc-badge ${badgeCls}">${badgeLbl}</span>
        <span class="acc-q">${inline(s.title || 'Analyze this code')}</span>
        <button class="acc-toggle">Reveal <span class="acc-arr">▾</span></button>
      </div>
      ${codeHTML}
      <div class="acc-ans">${ansHTML}</div>
    </div>`;
    }

    function renderCallout(s) {
      const v = s.variant || 'note';
      const ico = { note: '📌', tip: '💡', warning: '⚠️', danger: '🚨' }[v] || '📌';
      const lbl = s.label || { note: 'Note', tip: 'Pro Tip', warning: 'Warning', danger: 'Important' }[v] || 'Note';
      return `
    <div class="callout callout-${v}">
      <span class="callout-ico">${ico}</span>
      <div>
        <div class="callout-lbl">${esc(lbl)}</div>
        <div class="callout-txt">${inline(s.content)}</div>
      </div>
    </div>`;
    }

    function renderList(s) {
      const tag = s.ordered ? 'ol' : 'ul';
      const cls = s.ordered ? 'sec-ol' : 'sec-ul';
      return `<${tag} class="${cls}">${(s.items || []).map(i => `<li>${inline(i)}</li>`).join('')}</${tag}>`;
    }

    function renderTable(s) {
      const ths = (s.headers || []).map(h => `<th>${esc(h)}</th>`).join('');
      const trs = (s.rows || []).map(r => `<tr>${r.map(c => `<td>${inline(c)}</td>`).join('')}</tr>`).join('');
      return `<div class="tbl-wrap"><table class="sec-tbl"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
    }

    /* ═══════════════════════════════════════════════════
       ⑥ CHAPTER FOOTER NAVIGATION
    ═══════════════════════════════════════════════════ */
    function buildFooterNav(activeId) {
      const idx = TOC.findIndex(c => c.id === activeId);
      let html = '<div class="ch-footer-nav">';
      if (idx > 0) {
        const p = TOC[idx - 1];
        html += `<button class="ch-nav-btn" onclick="loadChapter('${p.id}')"><span style="font-size:16px">←</span><div><span class="cnb-lbl">Previous Chapter</span><span class="cnb-title">Ch${p.num}: ${esc(p.title)}</span></div></button>`;
      }
      if (idx < TOC.length - 1) {
        const n = TOC[idx + 1];
        html += `<button class="ch-nav-btn next-btn" onclick="loadChapter('${n.id}')"><div><span class="cnb-lbl">Next Chapter</span><span class="cnb-title">Ch${n.num}: ${esc(n.title)}</span></div><span style="font-size:16px">→</span></button>`;
      }
      return html + '</div>';
    }

    /* ═══════════════════════════════════════════════════
       ⑦ ACCORDION INTERACTIONS
    ═══════════════════════════════════════════════════ */
    function initAccordions() {
      document.querySelectorAll('[data-acc]').forEach(acc =>
        acc.querySelector('.acc-head').addEventListener('click', () => acc.classList.toggle('open'))
      );
    }

    /* ═══════════════════════════════════════════════════
       ⑧ COPY CODE
    ═══════════════════════════════════════════════════ */
    function copyCode(btn, id) {
      const el = document.getElementById(id);
      if (!el) return;
      navigator.clipboard.writeText(el.textContent).then(() => {
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    /* ═══════════════════════════════════════════════════
       ⑨ HELPERS
    ═══════════════════════════════════════════════════ */
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    // inline() — HTML-escape first, then apply markdown-like formatting
    function inline(text) {
      if (!text) return '';
      return esc(String(text))
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<span class="ic">$1</span>')
        .replace(/_(.+?)_/g, '<em>$1</em>');
    }

    /* ═══════════════════════════════════════════════════
       ⑩ LOADING & ERROR STATES
    ═══════════════════════════════════════════════════ */
    function showLoading() {
      document.getElementById('contentArea').innerHTML =
        `<div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">Loading chapter…</div></div>`;
    }

    function showError(id, err) {
      document.getElementById('contentArea').innerHTML = `
    <div class="err-wrap">
      <div class="err-code">404</div>
      <div class="err-title">Chapter Not Found</div>
      <div class="err-desc">Could not load <strong>content/${id}.json</strong><br><br>Error: ${esc(err.message)}</div>
      <div class="err-hint">
        💡 This project must be served via a local HTTP server.<br>
        Try: <code>python -m http.server 8080</code> or use the <strong>VSCode Live Server</strong> extension,
        then open <code>http://localhost:8080</code> in your browser.
      </div>
    </div>`;
    }

    /* ═══════════════════════════════════════════════════
       ⑪ WELCOME SCREEN
    ═══════════════════════════════════════════════════ */
    function showWelcome() {

           <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
           <span class="btn-text">Reset</span>
        </button>
      `;

      <div style="margin-bottom: 35px; padding: 20px 24px; background: var(--bg3); border: 1px solid var(--bd2); border-radius: var(--r2); display: flex; align-items: center; flex-wrap: wrap; gap: 20px;">
        <div style="flex: 1; min-width: 200px;">
          <div style="font-size: 12px; color: var(--t2); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Your Progress</div>
          <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
            <div style="font-size: 28px; font-weight: 800; color: var(--t0); font-family: var(--fh);">${readCount} <span style="font-size: 16px; color: var(--t2); font-weight: 600;">/ ${totalCount} Chapters</span></div>

          <div style="font-size: 16px; font-weight: 700; color: var(--t0); margin-bottom: 12px; font-family: var(--fh);">Ch${lastCh.num}: ${esc(lastCh.title)}</div>

        </div>

      document.getElementById('contentArea').innerHTML = `

      <div class="welcome-tracks">
        <div class="track-card cpp-card" onclick="filterTrack('cpp')">
          <div class="tc-icon">⚡</div>
          <div class="tc-name">C++ Track</div>
          <div class="tc-desc">STL mastery, algorithmic strategies, and competitive programming patterns. From foundations to graphs and dynamic programming.</div>
          <div class="tc-count">20 Chapters · Algorithms & Data Structures</div>
        </div>
        <div class="track-card java-card" onclick="filterTrack('java')">
          <div class="tc-icon">☕</div>
          <div class="tc-name">Java Track</div>
          <div class="tc-desc">Academic OOP per CSE110 standards. Rigorous output prediction, error identification, inheritance, and polymorphism.</div>
          <div class="tc-count">20 Chapters · OOP & Problem Solving</div>
        </div>
      </div>
      <div class="welcome-stats">
        <div><div class="stat-n">40</div><div class="stat-l">Chapters</div></div>
        <div><div class="stat-n">2</div><div class="stat-l">Tracks</div></div>
        <div><div class="stat-n">100+</div><div class="stat-l">Interactive Exercises</div></div>
        <div><div class="stat-n">∞</div><div class="stat-l">Knowledge</div></div>
      </div>
      <div class="server-hint">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Serve with <code>python -m http.server</code> or VSCode Live Server for JSON loading to work.
      </div>
    </div>`;
    }

    /* ═══════════════════════════════════════════════════
       ⑫ EVENT LISTENERS
    ═══════════════════════════════════════════════════ */
    // Track tabs
    document.getElementById('trackTabs').addEventListener('click', e => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.filter = btn.dataset.filter;
      buildSidebar();
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', e => {
      state.query = e.target.value;
      buildSidebar();
    });

    // Hamburger
    const hamburger = document.getElementById('hamburger');
    const overlay = document.getElementById('overlay');
    const sidebar = document.getElementById('sidebar');
    const rightSidebarEl = document.getElementById('rightSidebar');
    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('vis'); }
    function openRightSidebar() { if(rightSidebarEl) rightSidebarEl.classList.add('open'); overlay.classList.add('vis'); }
    function closeSidebar() { 
      sidebar.classList.remove('open'); 
      if(rightSidebarEl) rightSidebarEl.classList.remove('open');
      overlay.classList.remove('vis'); 
    }
    hamburger.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
      if (e.key === 'Escape') closeSidebar();
    });

    function goHome() {
      state.activeId = null;
      buildSidebar();
      showWelcome();
    }

    function resetProgress() {
      if (confirm('Are you sure you want to reset all your reading progress? This action cannot be undone.')) {
        tracking.readChapters = [];
        tracking.lastChapter = null;
        localStorage.removeItem('readChapters');
        localStorage.removeItem('lastChapter');
        buildSidebar();
        if (state.activeId) {
          goHome();
        } else {
          showWelcome();
        }
      }
    }

    function filterTrack(track) {
      state.filter = track;
      const tabs = document.getElementById('trackTabs');
      if (tabs) {
        tabs.querySelectorAll('.tab-btn').forEach(btn => {
          if (btn.dataset.filter === track) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });
      }
      buildSidebar();
      showWelcome();
    }

    /* ═══════════════════════════════════════════════════
       ⑬ INIT
    ═══════════════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', () => {
      buildSidebar();
      showWelcome();

      // Scrollspy for Right Sidebar
      const ca = document.getElementById('contentArea');
      if (ca) {
        ca.addEventListener('scroll', () => {
          const headings = Array.from(ca.querySelectorAll('h2, h3, h4'));
          if (!headings.length) return;

          let currentId = '';
          for (const h of headings) {
            const rect = h.getBoundingClientRect();
            // If the heading is above or near the top of the viewport
            if (rect.top <= 120) {
              currentId = h.id;
            } else {
              break; // Since headings are in order, we can stop early
            }
          }
          if (!currentId && headings.length) currentId = headings[0].id; // Fallback to first

          document.querySelectorAll('.rs-item').forEach(el => {
            if (el.dataset.target === currentId) {
              el.classList.add('active');
            } else {
              el.classList.remove('active');
            }
          });

          // Reading Progress Meter Logic
          const scrollTop = ca.scrollTop;
          const scrollHeight = ca.scrollHeight;
          const clientHeight = ca.clientHeight;
          
          let progress = 0;
          if (scrollHeight > clientHeight) {
            progress = Math.min(100, Math.max(0, (scrollTop / (scrollHeight - clientHeight)) * 100));
          } else {
            progress = 100; // If content is smaller than viewport, it's 100% read
          }
          
          const meterBar = document.getElementById('readMeterBar');
          const meterText = document.getElementById('readMeterText');
          if (meterBar && meterText) {
            meterBar.style.width = progress + '%';
            meterText.textContent = Math.round(progress) + '%';
          }

          // Mark as read if >= 99%
          if (progress >= 99 && state.activeId) {
            if (!tracking.readChapters.includes(state.activeId)) {
              tracking.readChapters.push(state.activeId);
              localStorage.setItem('readChapters', JSON.stringify(tracking.readChapters));
              buildSidebar(); // Refresh sidebar to show tick
            }
          }
        });
      }
    });
  </script>
</body>
